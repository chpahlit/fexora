events {
    worker_connections 1024;
}

http {
    # Upstream definitions
    upstream api       { server api:8080; }
    upstream web       { server web:3000; }
    upstream acp       { server acp:3001; }
    upstream moderator { server moderator:3002; }

    # Shared settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API – api.fexora.io
    server {
        listen 80;
        server_name api.${DOMAIN};
        client_max_body_size 500M;

        location / {
            proxy_pass http://api;
        }

        # SignalR WebSocket support
        location /hubs/ {
            proxy_pass http://api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # Web – fexora.io
    server {
        listen 80;
        server_name ${DOMAIN} www.${DOMAIN};

        location / {
            proxy_pass http://web;
        }
    }

    # ACP – acp.fexora.io
    server {
        listen 80;
        server_name acp.${DOMAIN};

        location / {
            proxy_pass http://acp;
        }
    }

    # Moderator – mod.fexora.io
    server {
        listen 80;
        server_name mod.${DOMAIN};

        location / {
            proxy_pass http://moderator;
        }
    }
}
