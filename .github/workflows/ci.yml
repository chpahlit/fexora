name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ── Lint & Type-Check (Frontend) ──
  frontend-checks:
    name: Frontend Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript type-check
        run: pnpm type-check

  # ── .NET Build & Format ──
  api-build:
    name: API Build & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: apps/api

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore
        working-directory: apps/api

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: apps/api

  # ── .NET Unit Tests ──
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: api-build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fexora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test
        run: dotnet test --no-restore --verbosity normal
        working-directory: apps/api
        env:
          ConnectionStrings__Default: "Host=localhost;Database=fexora_test;Username=test;Password=test"
          Redis__Connection: "localhost:6379"
          Jwt__Secret: "ci-test-secret-key-that-is-long-enough-for-hmac256"
          Jwt__Issuer: "fexora-ci"
          Jwt__Audience: "fexora-ci"

  # ── Frontend Build ──
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-checks
    strategy:
      matrix:
        app: [web, acp, moderator]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm turbo build --filter=${{ matrix.app }}
        env:
          NEXT_PUBLIC_API_URL: https://api.fexora.io
