services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fexora_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fexora}
    ports:
      - "5400:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fexora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6500:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fexora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fexora_dev_123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init (create default bucket) ──
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-fexora} $${MINIO_ROOT_PASSWORD:-fexora_dev_123};
      mc mb --ignore-existing local/fexora-media;
      mc anonymous set download local/fexora-media/public;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
